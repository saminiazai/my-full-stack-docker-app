name: Build and Push Docker Images

on:
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:

  build-and-push:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ steps.vars.outputs.sha_short }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/backend:${{ steps.vars.outputs.sha_short }}

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nginx:${{ steps.vars.outputs.sha_short }}

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:

      - name: Create deploy directory
        run: mkdir -p ~/app/deploy

      - name: Download compose file
        run: |
          curl -o ~/app/deploy/docker-compose.yml https://raw.githubusercontent.com/innoetech-dev/my-full-stack-docker-app/refs/heads/feature/v2-purple/ci_docker-compose.yml

      - name: Replace placeholders
        run: |
          sed -i "s|DOCKERHUB_USERNAME|${{ secrets.DOCKERHUB_USERNAME }}|g" ~/app/deploy/docker-compose.yml
          sed -i "s|IMAGE_TAG|${{ needs.build-and-push.outputs.sha_short }}|g" ~/app/deploy/docker-compose.yml

      - name: Pull latest images
        run: docker-compose -f ~/app/deploy/docker-compose.yml pull

      - name: Restart containers
        run: docker-compose -f ~/app/deploy/docker-compose.yml up -d