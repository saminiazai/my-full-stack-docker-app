services:
  frontend-container:
    build: ./frontend
    ports:
      - "8080:80"

  backend-container:
    build: ./backend
    ports:
      - "3000:3000"

  nginx-proxy:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-container
      - backend-container
